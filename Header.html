<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f5f5f5;
}

.topo {
  background: #fff;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 50px;
  height: 50px;
  background: #ddd;
  border-radius: 10px;
}

.search {
  flex: 1;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

.banner-topo {
  width: 100%;
  height: 180px;
  background: #ddd;
  border-radius: 0 0 20px 20px;
  margin-bottom: 10px;
}

.menu {
  display: flex;
  overflow-x: auto;
  background: #fff;
  padding: 10px;
  gap: 10px;
}

.menu a {
  text-decoration: none;
  color: #000;
  background: #eee;
  padding: 8px 15px;
  border-radius: 20px;
  white-space: nowrap;
}

.carousel-container {
  position: relative;
  overflow: hidden;
  background: #fff;
  padding: 30px 60px;
}

.carousel {
  display: flex;
  gap: 25px;
  transition: transform 0.5s ease;
}

.carousel-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
}

.circle {
  width: 200px;
  height: 200px;
  background: #ddd;
  border-radius: 50%;
  transition: all 0.3s ease;
}

.carousel-item span {
  margin-top: 8px;
  font-size: 14px;
  color: #333;
}

.carousel-item:hover .circle {
  transform: scale(1.1);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.carousel-item:hover span {
  color: #007bff;
}

.nav {

  position: absolute;
  top: 40%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  padding: 12px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
  width: 40px;    
  height: 40px;    
  padding: 0; 
} 


.nav.left { left: 10px; }
.nav.right { right: 10px; }

.section {
  padding: 20px;
}

.section h2 {
  text-align: center;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 15px;
  padding: 0 30px;
}

.card {
  background: #ddd;
  height: 120px;
  border-radius: 20px;
}

.banner {
  height: 120px;
  background: #ddd;
  margin: 20px 30px;
  border-radius: 20px;
}

.whatsapp {
  position: fixed;
  right: 15px;
  bottom: 20px;
  background: #25D366;
  color: white;
  font-size: 24px;
  padding: 12px 15px;
  border-radius: 50%;
  text-decoration: none;
  z-index: 999;
}

@media (max-width: 600px) {
  .circle {
    width: 95px;
    height: 95px;
  }

  .carousel {
    gap: 25px;
  }

  .banner-topo {
    height: 140px;
  }
}
</style>

<script>
let index = 0;
const carousel = document.getElementById("carousel");
const items = document.querySelectorAll(".carousel-item");

let visibleItems = 0;
let itemWidth = 0;
let interval;

function calculateSizes() {
  const containerWidth = document.querySelector(".carousel-container").offsetWidth;
  itemWidth = items[0].offsetWidth + 35;
  visibleItems = Math.floor(containerWidth / itemWidth);
}

function updateCarousel() {
  carousel.style.transform = `translateX(-${index * itemWidth}px)`;
}

function nextSlide() {
  if (index < items.length - visibleItems) {
    index++;
  } else {
    index = 0;
  }
  updateCarousel();
}

function prevSlide() {
  if (index > 0) {
    index--;
  } else {
    index = items.length - visibleItems;
  }
  updateCarousel();
}

function startCarousel() {
  interval = setInterval(nextSlide, 3000);
}

function pauseCarousel() {
  clearInterval(interval);
}

window.addEventListener("resize", () => {
  calculateSizes();
  updateCarousel();
});

calculateSizes();
startCarousel();
</script>
